<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snejin Agenda</title>

    <link rel="icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <!-- FullCalendar -->
    <link
        href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
        rel="stylesheet">

</head>

<body class="agenda-page">

    <!-- =========================
         HEADER
    ========================== -->

    <header class="topbar">

        <div class="logo-area">

            <img
                src="logo.png"
                class="logo-small"
                alt="Snejin Agenda logo">

            <div>
                <h1>Snejin Agenda</h1>
                <span>Familieagenda</span>
            </div>

        </div>

        <div class="top-buttons">

            <input
                id="search"
                type="search"
                placeholder="🔍 Zoek afspraak">

            <button
                id="themeButton"
                type="button"
                title="Donkere modus">
                🌙
            </button>

            <button
                id="logoutButton"
                type="button">
                🚪 Uitloggen
            </button>

        </div>

    </header>

    <!-- =========================
         KALENDER
    ========================== -->

    <main>

        <section class="calendar-card">

            <div id="calendar"></div>

        </section>

    </main>

    <!-- =========================
         PLUS KNOP
    ========================== -->

    <button
        id="addEventButton"
        class="floatingButton"
        type="button"
        aria-label="Nieuwe afspraak toevoegen">
        +
    </button>

    <!-- =========================
         POPUP ACHTERGROND
    ========================== -->

    <div
        id="eventModal"
        class="modal"
        aria-hidden="true">

        <div class="modal-content">
