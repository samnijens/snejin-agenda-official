<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snejin Agenda</title>

<link rel="stylesheet" href="style.css">


<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

</head>


<body class="agenda-background">


<header>

<div class="brand">

<img src="logo.png" class="logo-small">

<h1>Snejin Agenda 🌴</h1>

</div>


<button id="logoutButton">
Uitloggen
</button>


</header>



<main class="agenda-box">

<div id="calendar"></div>

</main>



<!-- afspraak venster -->

<div id="eventModal" class="modal">


<div class="modal-content">


<h2>
Nieuwe afspraak
</h2>


<input id="eventTitle"
placeholder="Naam afspraak">


<textarea id="eventDescription"
placeholder="Omschrijving"></textarea>


<label>
Datum
</label>

<input id="eventDate" type="date">



<label>
Tijd
</label>

<input id="eventTime" type="time">



<label>

<input id="allDay" type="checkbox">

Hele dag

</label>



<label>
Type afspraak
</label>


<select id="eventType">

<option value="werk">
🔴 Werken
</option>

<option value="vakantie">
🟢 Vakanties
</option>

<option value="activiteit">
🟩 Activiteiten
</option>

<option value="verjaardag">
🟠 Verjaardagen
</option>

<option value="feestdag">
🟡 Officiële feestdagen
</option>


</select>



<button id="saveEvent">
Opslaan
</button>


<button id="closeModal">
Annuleren
</button>


</div>

</div>



<script type="module" src="agenda.js"></script>


</body>

</html>
