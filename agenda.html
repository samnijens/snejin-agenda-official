<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snejin Agenda</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body class="agenda-page">

<header class="topbar">
  <div class="logo-area">
    <img src="logo.png" class="logo-small" alt="Logo">
    <div>
      <h1>Snejin Agenda</h1>
      <span>Familieagenda</span>
    </div>
  </div>

  <div class="top-buttons">
    <input id="search" type="search" placeholder="🔍 Zoek afspraak">
    <button id="themeButton" type="button">🌙</button>
    <button id="logoutButton" type="button">🚪 Uitloggen</button>
  </div>
</header>

<main>
  <section class="calendar-card">
    <div id="calendar"></div>
  </section>
</main>

<button id="addEventButton" class="floatingButton" type="button" title="Nieuwe afspraak">+</button>

<!-- ============ INFO / BEKIJKEN MODAL ============ -->
<div id="eventViewModal" class="modal">
  <div class="modal-content view-content">
    <button class="modal-close" id="closeViewX" type="button" aria-label="Sluiten">&times;</button>

    <span class="view-badge" id="viewBadge">Categorie</span>
    <h2 id="viewTitle">Afspraak</h2>

    <div class="view-meta">
      <div class="view-row"><span class="view-icon">📅</span><span id="viewDate">-</span></div>
      <div class="view-row"><span class="view-icon">⏰</span><span id="viewTime">-</span></div>
      <div class="view-row"><span class="view-icon">🏷️</span><span id="viewCategoryName">-</span></div>
    </div>

    <div class="view-desc">
      <h3>Omschrijving</h3>
      <p id="viewDescription">Geen omschrijving.</p>
    </div>

    <div class="modal-buttons">
      <button id="editFromViewButton" class="btn btn-edit" type="button">✏️ Bewerken</button>
      <button id="deleteFromViewButton" class="btn btn-delete" type="button">🗑️ Verwijderen</button>
      <button id="closeViewButton" class="btn btn-cancel" type="button">Sluiten</button>
    </div>
  </div>
</div>

<!-- ============ NIEUW / BEWERKEN MODAL ============ -->
<div id="eventModal" class="modal">
  <div class="modal-content form-content">
    <button class="modal-close" id="closeFormX" type="button" aria-label="Sluiten">&times;</button>

    <h2 id="formTitle">Nieuwe afspraak</h2>

    <div class="form-body">
      <div class="form-group">
        <label for="eventTitle">Naam</label>
        <input id="eventTitle" type="text" placeholder="Bijv. Tandarts">
      </div>

      <div class="form-group">
        <label for="eventDescription">Omschrijving</label>
        <textarea id="eventDescription" rows="3" placeholder="Extra informatie..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="eventDate">Datum</label>
          <input id="eventDate" type="date">
        </div>
        <div class="form-group">
          <label for="eventTime">Tijd</label>
          <input id="eventTime" type="time">
        </div>
      </div>

      <div class="form-group">
        <label for="eventType">Categorie</label>
        <select id="eventType">
          <option value="work">🔴 Werken</option>
          <option value="holiday">🟢 Vakantie</option>
          <option value="activity">🟩 Activiteit</option>
          <option value="birthday">🟠 Verjaardag</option>
          <option value="holidayofficial">🟡 Officiële feestdag</option>
        </select>
      </div>

      <label class="checkbox-line">
        <input id="allDay" type="checkbox"> Hele dag
      </label>
    </div>

    <div class="modal-buttons">
      <button id="saveEventButton" class="btn btn-save" type="button">💾 Opslaan</button>
      <button id="cancelEventButton" class="btn btn-cancel" type="button">Annuleren</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script type="module" src="agenda.js"></script>
</body>
</html>
