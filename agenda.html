<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snejin Agenda</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body class="agenda-page">

<header class="topbar">
  <div class="logo-area">
    <img src="logo.png" class="logo-small" alt="Logo">
    <div>
      <h1>Snejin Agenda</h1>
      <span>Familieagenda</span>
    </div>
  </div>
  <div class="top-buttons">
    <input id="search" type="search" placeholder="🔍 Zoek afspraak">
    <button id="themeButton" type="button">🌙</button>
    <button id="logoutButton" type="button">🚪 Uitloggen</button>
  </div>
</header>

<main>
  <section class="calendar-card">
    <div id="calendar"></div>
  </section>
</main>

<button id="addEventButton" class="floatingButton" type="button">+</button>

<!-- VIEW MODAL - Info bekijken -->
<div id="viewModal" class="modal">
  <div class="modal-content view-content">
    <button class="modal-close" id="viewCloseX">✕</button>
    <div id="viewCategoryBadge" class="category-badge">🔴 Werken</div>
    <h2 id="viewTitle">Afspraak titel</h2>
    <div class="view-meta">
      <span id="viewDate">📅 12 juli 2026</span>
      <span id="viewTime">⏰ 14:00</span>
    </div>
    <p id="viewDescription" class="view-desc">Geen omschrijving.</p>
    <div class="modal-buttons">
      <button id="viewEditButton" class="btn-primary">✏️ Bewerken</button>
      <button id="viewDeleteButton" class="btn-danger">🗑️ Verwijderen</button>
      <button id="viewCloseButton" class="btn-secondary">Sluiten</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL - Maken / Bewerken -->
<div id="eventModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" id="formCloseX">✕</button>
    <h2 id="formTitle">Nieuwe afspraak</h2>
    <p class="form-subtitle">Voeg een nieuwe afspraak toe voor de hele familie.</p>

    <div class="form-group-modal">
      <label>Naam afspraak</label>
      <input id="eventTitle" type="text" placeholder="Bijv. Verjaardag mama">
    </div>

    <div class="form-group-modal">
      <label>Omschrijving</label>
      <textarea id="eventDescription" placeholder="Waar, wat meenemen..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group-modal">
        <label>Datum</label>
        <input id="eventDate" type="date">
      </div>
      <div class="form-group-modal">
        <label>Tijd</label>
        <input id="eventTime" type="time">
      </div>
    </div>

    <label class="checkbox-label"><input id="allDay" type="checkbox"> Hele dag</label>

    <div class="form-group-modal">
      <label>Categorie</label>
      <select id="eventType">
        <option value="work">🔴 Werken</option>
        <option value="holiday">🟢 Vakantie</option>
        <option value="activity">🟩 Activiteit</option>
        <option value="birthday">🟠 Verjaardag</option>
        <option value="holidayofficial">🟡 Officiële feestdag</option>
      </select>
    </div>

    <div class="modal-buttons">
      <button id="saveEventButton" class="btn-primary">💾 Opslaan</button>
      <button id="cancelEventButton" class="btn-secondary">Annuleren</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script type="module" src="agenda.js"></script>
</body>
</html>
