<!DOCTYPE html>
<html lang="nl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snejin Agenda - Inloggen</title>

    <meta name="theme-color" content="#009688">

    <link rel="icon" type="image/png" href="logo.png">

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-background">

<div class="login-container">

    <div class="login-card">

        <img
            src="logo.png"
            alt="Snejin Agenda"
            class="logo">

        <h1>Snejin Agenda</h1>

        <p class="subtitle">
            Familieagenda voor iedereen 🌴
        </p>

        <form id="loginForm">

            <div class="input-group">

                <label for="email">
                    E-mailadres
                </label>

                <input
                    id="email"
                    type="email"
                    autocomplete="email"
                    placeholder="naam@email.nl"
                    required>

            </div>

            <div class="input-group">

                <label for="password">
                    Wachtwoord
                </label>

                <input
                    id="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="••••••••"
                    required>

            </div>

            <button
                type="submit"
                id="loginButton">

                Inloggen

            </button>

        </form>

        <div id="message"></div>

    </div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
